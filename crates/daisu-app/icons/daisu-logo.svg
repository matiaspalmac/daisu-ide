<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Daisu IDE">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#1C1C25"/>
      <stop offset="60%" stop-color="#14141B"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C497"/>
      <stop offset="55%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#A88458"/>
    </linearGradient>
    <filter id="warmShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.45"/>
      <feComposite in2="off" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer rounded square (icon shape) -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle warm vignette accents -->
  <circle cx="120" cy="100" r="180" fill="#D4A574" opacity="0.05"/>
  <circle cx="420" cy="430" r="200" fill="#A88458" opacity="0.04"/>

  <!-- Horizon stroke (kintsugi) -->
  <line x1="80" y1="320" x2="432" y2="320"
        stroke="url(#ink)" stroke-width="1.5" opacity="0.35"/>

  <!-- Kanji 大 (dai) — drawn as paths so it renders without font dependency -->
  <g transform="translate(256 248)" filter="url(#warmShadow)">
    <!-- Top horizontal stroke -->
    <path d="M -120 -55 Q 0 -78 120 -55"
          fill="none" stroke="url(#ink)" stroke-width="22"
          stroke-linecap="round"/>
    <!-- Left diagonal -->
    <path d="M -10 -55 Q -60 30 -135 110"
          fill="none" stroke="url(#ink)" stroke-width="22"
          stroke-linecap="round"/>
    <!-- Right diagonal -->
    <path d="M 10 -55 Q 60 30 140 115"
          fill="none" stroke="url(#ink)" stroke-width="22"
          stroke-linecap="round"/>
  </g>

  <!-- Wordmark dot (small accent below) -->
  <circle cx="256" cy="420" r="3" fill="#D4A574" opacity="0.7"/>
</svg>
